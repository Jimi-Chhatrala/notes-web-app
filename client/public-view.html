<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Public Note - Notaty</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Handlee&family=Indie+Flower&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/dompurify/dist/purify.min.js"></script>
    <style>
        .public-container {
            max-width: 800px;
            margin: 50px auto;
            padding: 40px;
            background: #fff;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }
        .note-header {
            border-bottom: 2px solid #eee;
            padding-bottom: 20px;
            margin-bottom: 20px;
        }
        .note-title {
            font-family: 'Indie Flower', cursive;
            font-size: 42px;
            margin: 0;
            color: #333;
        }
        .note-meta {
            color: #888;
            font-size: 14px;
            margin-top: 10px;
        }
        .note-content {
            font-size: 18px;
            line-height: 1.6;
            color: #444;
            min-height: 300px;
            word-wrap: break-word; /* Ensure long words/links don't overflow */
        }
        .note-content img {
            max-width: 100%;
            height: auto;
            border-radius: 8px;
            margin: 10px 0;
        }
        .back-link {
            display: inline-block;
            margin-bottom: 20px;
            color: #008cba;
            text-decoration: none;
            font-weight: bold;
        }
        .back-link:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body style="background: #fdf6e3;">
    <div class="public-container">
        <a href="index.html" class="back-link"><i class="fa-solid fa-arrow-left"></i> Back to Notaty</a>
        <div id="loading" style="text-align: center; padding: 50px;">
            <i class="fa-solid fa-circle-notch fa-spin" style="font-size: 40px; color: #008cba;"></i>
            <p style="margin-top: 15px;">Loading public note...</p>
        </div>
        <div id="error" style="display: none; text-align: center; color: #cc0000; padding: 50px;">
            <i class="fa-solid fa-circle-exclamation" style="font-size: 40px;"></i>
            <p id="errorMsg" style="margin-top: 15px; font-size: 18px;"></p>
        </div>
        <div id="noteView" style="display: none;">
            <div class="note-header">
                <h1 id="title" class="note-title"></h1>
                <div class="note-meta">
                    <span id="category" style="background: #4caf50; color: white; padding: 2px 10px; border-radius: 15px; font-size: 12px;"></span>
                    <span id="updatedAt" style="margin-left: 15px;"></span>
                </div>
            </div>
            <div id="content" class="note-content"></div>
        </div>
    </div>

    <script src="note-client.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const urlParams = new URLSearchParams(window.location.search);
            const noteId = urlParams.get('id');

            if (!noteId) {
                showError('Invalid note link.');
                return;
            }

            window.AppAPI.getPublicNote(noteId).then(note => {
                document.getElementById('loading').style.display = 'none';
                if (note && !note.message) {
                    document.getElementById('noteView').style.display = 'block';
                    document.getElementById('title').textContent = note.title;
                    document.getElementById('category').textContent = note.category || 'General';
                    document.getElementById('updatedAt').textContent = `Last updated: ${new Date(note.updatedAt).toLocaleString()}`;
                    
                    // Sanitize and render content
                    const contentEl = document.getElementById('content');
                    contentEl.innerHTML = typeof DOMPurify !== 'undefined' ? DOMPurify.sanitize(note.content) : note.content;
                } else {
                    showError(note.message || 'Note not found or no longer public.');
                }
            }).catch(err => {
                document.getElementById('loading').style.display = 'none';
                showError('An error occurred while fetching the note.');
            });
        });

        function showError(msg) {
            document.getElementById('loading').style.display = 'none';
            document.getElementById('error').style.display = 'block';
            document.getElementById('errorMsg').textContent = msg;
        }
    </script>
</body>
</html>
